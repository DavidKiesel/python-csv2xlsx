[run]
source_pkgs = [
    "dhk.csv2xlsx",
    "tests"
]
branch = true
parallel = true
omit = [
    "src/dhk/csv2xlsx/__about__.py",
]

[paths]
csv2xlsx = [
    "src/dhk/csv2xlsx"
]
tests = [
    "tests"
]

[report]
exclude_lines = [
    "no cov",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
